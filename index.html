<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #1f1f2e, #0f0f17);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

/* Container */
.container {
  text-align: center;
  animation: fadeIn 2s ease;
}

/* BIG TITLE */
h1 {
  font-size: 3.2em;
  letter-spacing: 2px;
  text-transform: uppercase;
  background: linear-gradient(90deg, #ff7a18, #ffd700, #00ffcc);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: glow 2s ease-in-out infinite alternate;
}

/* Glow */
@keyframes glow {
  from { text-shadow: 0 0 10px #ff7a18; }
  to { text-shadow: 0 0 25px #ffd700, 0 0 35px #00ffcc; }
}

/* Fade */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

p {
  margin-top: 20px;
  font-size: 1.2em;
  color: #ddd;
}

button {
  margin-top: 30px;
  padding: 12px 30px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(45deg, #ff7a18, #ffb347);
  color: white;
  font-size: 1em;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.1);
}

#hidden {
  margin-top: 20px;
  display: none;
  color: #ffd700;
}

/* Confetti */
.confetti {
  position: fixed;
  width: 8px;
  height: 8px;
  top: -10px;
  animation: fall linear infinite;
}

@keyframes fall {
  to {
    transform: translateY(110vh) rotate(360deg);
  }
}
</style>

</head>

<body>

<div class="container">
  <h1>HAPPY BIRTHDAY<br>KHEIRA (MISS SUZ) 🎉</h1>

  <p>
    نتمنى لك عام مليء بالنجاح والفرح ✨<br>
    وإن شاء الله تحقق كل أهدافك 🌟
  </p>

  <button onclick="start()">Click 🎵</button>

  <div id="hidden">
    PS: Made With ♥ BY Riké 😄
  </div>
</div>

<!-- Birthday Song -->
<audio id="song">
  <source src="https://www.soundjay.com/human/sounds/happy-birthday-song-01.mp3" type="audio/mpeg">
</audio>

<script>
function start() {
  document.getElementById("hidden").style.display = "block";
  document.getElementById("song").play();
  confetti();
}

// Confetti
function confetti() {
  for (let i = 0; i < 70; i++) {
    let el = document.createElement("div");
    el.className = "confetti";

    el.style.left = Math.random() * 100 + "vw";
    el.style.backgroundColor =
      ["#ff7a18","#ffd700","#00ffcc","#ff4d6d"][Math.floor(Math.random()*4)];
    el.style.animationDuration = (Math.random() * 3 + 2) + "s";

    document.body.appendChild(el);

    setTimeout(() => el.remove(), 5000);
  }
}
</script>

</body>
</html>
